<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors Ligne - Dalil Tounes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    h1 {
      color: #2d3748;
      font-size: 28px;
      margin-bottom: 15px;
      font-weight: 600;
    }

    p {
      color: #718096;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .retry-btn {
      background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .features {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #e2e8f0;
      text-align: left;
    }

    .features h3 {
      color: #2d3748;
      font-size: 16px;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .features ul {
      list-style: none;
      padding: 0;
    }

    .features li {
      color: #718096;
      font-size: 14px;
      padding: 8px 0;
      padding-left: 25px;
      position: relative;
    }

    .features li:before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #D4AF37;
      font-weight: bold;
    }

    .lang-switch {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }

    .lang-switch button {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      padding: 8px 15px;
      margin: 0 5px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #4a5568;
      transition: all 0.2s;
    }

    .lang-switch button:hover {
      background: #edf2f7;
      border-color: #cbd5e0;
    }

    .lang-switch button.active {
      background: #D4AF37;
      color: white;
      border-color: #D4AF37;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1 id="title">Vous êtes hors ligne</h1>
    <p id="description">
      Impossible de se connecter au réseau. Veuillez vérifier votre connexion Internet et réessayer.
    </p>

    <button class="retry-btn" onclick="window.location.reload()">
      <span id="retryText">Réessayer</span> 🔄
    </button>

    <div class="features">
      <h3 id="featuresTitle">Ce qui fonctionne hors ligne :</h3>
      <ul id="featuresList">
        <li>Pages récemment visitées</li>
        <li>Images en cache</li>
        <li>Interface utilisateur</li>
        <li>Données sauvegardées localement</li>
      </ul>
    </div>

    <div class="lang-switch">
      <button onclick="switchLang('fr')" class="active" id="btnFr">Français</button>
      <button onclick="switchLang('ar')" id="btnAr">العربية</button>
      <button onclick="switchLang('en')" id="btnEn">English</button>
    </div>
  </div>

  <script>
    const translations = {
      fr: {
        title: 'Vous êtes hors ligne',
        description: 'Impossible de se connecter au réseau. Veuillez vérifier votre connexion Internet et réessayer.',
        retry: 'Réessayer',
        featuresTitle: 'Ce qui fonctionne hors ligne :',
        features: [
          'Pages récemment visitées',
          'Images en cache',
          'Interface utilisateur',
          'Données sauvegardées localement'
        ]
      },
      ar: {
        title: 'أنت غير متصل بالإنترنت',
        description: 'تعذر الاتصال بالشبكة. يرجى التحقق من اتصالك بالإنترنت والمحاولة مرة أخرى.',
        retry: 'إعادة المحاولة',
        featuresTitle: 'ما يعمل دون اتصال:',
        features: [
          'الصفحات التي تمت زيارتها مؤخرًا',
          'الصور المخزنة مؤقتًا',
          'واجهة المستخدم',
          'البيانات المحفوظة محليًا'
        ]
      },
      en: {
        title: 'You are offline',
        description: 'Unable to connect to the network. Please check your Internet connection and try again.',
        retry: 'Retry',
        featuresTitle: 'What works offline:',
        features: [
          'Recently visited pages',
          'Cached images',
          'User interface',
          'Locally saved data'
        ]
      }
    };

    function switchLang(lang) {
      const t = translations[lang];
      document.getElementById('title').textContent = t.title;
      document.getElementById('description').textContent = t.description;
      document.getElementById('retryText').textContent = t.retry;
      document.getElementById('featuresTitle').textContent = t.featuresTitle;

      const featuresList = document.getElementById('featuresList');
      featuresList.innerHTML = t.features.map(f => `<li>${f}</li>`).join('');

      // Update active button
      document.querySelectorAll('.lang-switch button').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById('btn' + lang.charAt(0).toUpperCase() + lang.slice(1)).classList.add('active');

      // Update document lang
      document.documentElement.lang = lang;
      if (lang === 'ar') {
        document.body.style.direction = 'rtl';
      } else {
        document.body.style.direction = 'ltr';
      }
    }
  </script>
</body>
</html>
